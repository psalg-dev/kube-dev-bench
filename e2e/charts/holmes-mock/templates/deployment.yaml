apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: holmes-mock
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: 
          - node
          - /app/server.js
        env:
        - name: HOLMES_MOCK_HOST
          value: "0.0.0.0"
        - name: HOLMES_MOCK_PORT
          value: "5050"
        ports:
        - name: http
          containerPort: 5050
          protocol: TCP
        livenessProbe:
          exec:
            command:
            - wget
            - -q
            - -O-
            - -T2
            - http://127.0.0.1:5050/healthz
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - wget
            - -q
            - -O-
            - -T2
            - http://127.0.0.1:5050/healthz
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: scripts
          mountPath: /app
      volumes:
      - name: scripts
        configMap:
          name: {{ .Release.Name }}-scripts
