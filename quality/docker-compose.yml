services:
  # Go Analysis Service
  go-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.go-analyzer
    volumes:
      - ..:/workspace:ro
      - ./reports/go:/reports
      - ./config:/config:ro
    environment:
      - GOPROXY=https://proxy.golang.org,direct
    working_dir: /workspace
    command: /scripts/analyze-go.sh

  # JavaScript Analysis Service
  js-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.js-analyzer
    volumes:
      - ../frontend:/workspace:ro
      - ./reports/js:/reports
      - ./config:/config:ro
    working_dir: /workspace
    command: /scripts/analyze-js.sh

  # Security Scanner
  security-scanner:
    image: aquasec/trivy:latest
    volumes:
      - ..:/workspace:ro
      - ./reports/security:/reports
      - ./config/trivy.yaml:/trivy.yaml:ro
      - trivy_cache:/root/.cache/trivy
    command: >
      fs --config /trivy.yaml
      --format json
      --output /reports/trivy-report.json
      /workspace

  # Secrets Scanner
  secrets-scanner:
    image: zricethezav/gitleaks:latest
    volumes:
      - ..:/workspace:ro
      - ./reports/security:/reports
    command: >
      detect --source /workspace
      --report-format json
      --report-path /reports/gitleaks-report.json
      --no-git
      --exit-code 0

  # Lines of Code Counter
  cloc:
    image: aldanial/cloc:latest
    volumes:
      - ..:/workspace:ro
      - ./reports:/reports
    command: >
      /workspace
      --exclude-dir=node_modules,vendor,wailsjs,reports,dist,build
      --json
      --out=/reports/cloc-report.json

  # Report Aggregator
  report-aggregator:
    image: node:24-alpine
    volumes:
      - ./reports:/reports
      - ./scripts:/scripts:ro
      - ./thresholds.json:/thresholds.json:ro
    working_dir: /reports
    command: node /scripts/aggregate-reports.js
    profiles: ["aggregate"]

  # SonarQube (optional, for persistent dashboard)
  sonarqube:
    image: sonarqube:community
    profiles: ["full"]
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    profiles: ["full"]
    volumes:
      - ..:/usr/src
      - ./config/sonar-project.properties:/opt/sonar-scanner/conf/sonar-project.properties
    depends_on:
      - sonarqube

volumes:
  sonarqube_data:
  sonarqube_logs:
  trivy_cache:
