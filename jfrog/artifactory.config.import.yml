version: 1

# This file is mounted into the JFrog Container Registry container at
# /var/opt/jfrog/artifactory/etc/artifactory/artifactory.config.import.yml
#
# It is used for deterministic local/E2E bootstrapping, especially when the
# repository-management REST API is not available.
#
# Notes:
# - We intentionally do NOT include a licenseKey here.
# - The onboarding repo types enable Docker support, but we need the bootstrap
#   script (or UI automation) to actually create the docker-local repository
#   since LocalRepositoriesConfiguration is not supported in JCR free.
# - The EULA acceptance is required to skip the onboarding wizard in JCR 7.x
#   See: https://stackoverflow.com/questions/60095151/how-can-i-automatically-accept-artifactory-eula

GeneralConfiguration:
  baseUrl: "http://localhost:8082"
  eula:
    accepted: true

OnboardingConfiguration:
  repoTypes:
    - docker
    - helm
