name: Build

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests (with coverage)
        working-directory: frontend
        run: npm test -- --coverage

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn
          retention-days: 7

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: frontend/coverage
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  backend:
    runs-on: ubuntu-22.04
    needs: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Go dependencies
        run: go mod download

      - name: Run Go tests (with coverage)
        # Use ./pkg/... to measure only application logic; main.go is a thin
        # Wails bootstrap wrapper with no testable logic of its own.
        run: go test -v -coverprofile=coverage.out -covermode=atomic ./pkg/...

      - name: Display coverage summary
        run: go tool cover -func coverage.out | tail -1

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: coverage.out
          if-no-files-found: warn
          retention-days: 7

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Go app
        run: go build -v .

      - name: Install Wails Linux dependencies for dev build
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.0-dev
          version: 1.0

      - name: Build Wails dev binary for E2E
        run: |
          go build -tags dev -gcflags "all=-N -l" -o build/bin/kube-dev-bench-e2e .
          echo "Dev binary size: $(du -h build/bin/kube-dev-bench-e2e | cut -f1)"

      - name: Upload E2E dev binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: e2e-dev-binary
          path: build/bin/kube-dev-bench-e2e
          retention-days: 1

  e2e:
    runs-on: ubuntu-22.04
    needs: backend
    env:
      HOLMES_MOCK_NODE_IMAGE: node:24-alpine
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: e2e-shard-1
            shard: 1
            base_port: 34200
            registry: false
            holmes_deploy: false
            mcp: false
          - name: e2e-shard-2
            shard: 2
            base_port: 34300
            registry: false
            holmes_deploy: false
            mcp: false
          - name: e2e-shard-3
            shard: 3
            base_port: 34700
            registry: false
            holmes_deploy: false
            mcp: false
          - name: e2e-mcp
            base_port: 34400
            registry: false
            holmes_deploy: false
            mcp: true
          - name: e2e-holmes-deploy
            base_port: 34600
            registry: false
            holmes_deploy: true
            mcp: false
          - name: e2e-registry
            base_port: 34500
            registry: true
            holmes_deploy: false
            mcp: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Download E2E dev binary
        uses: actions/download-artifact@v8
        with:
          name: e2e-dev-binary
          path: build/bin

      - name: Make dev binary executable
        run: chmod +x build/bin/kube-dev-bench-e2e

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Install KinD
        run: |
          curl -sSL -o kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Initialize Docker Swarm (for Swarm E2Es)
        run: |
          state=$(docker info --format '{{.Swarm.LocalNodeState}}' 2>/dev/null || echo "inactive")
          echo "Swarm state before: ${state}"
          if [ "${state}" != "active" ]; then
            docker swarm init --advertise-addr 127.0.0.1
          fi
          docker info --format '{{.Swarm.LocalNodeState}}'

      - name: Cache KinD node image
        uses: actions/cache@v4
        id: kind-image-cache
        with:
          path: /tmp/kind-node-image.tar
          key: kind-v0.23.0-node-image

      - name: Load cached KinD node image
        if: steps.kind-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/kind-node-image.tar

      - name: Create KinD cluster
        run: |
          kind create cluster --name kdb-e2e --wait 120s

      - name: Save KinD node image for cache
        if: steps.kind-image-cache.outputs.cache-hit != 'true'
        run: |
          NODE_IMAGE=$(docker ps --filter "name=kdb-e2e-control-plane" --format "{{.Image}}")
          echo "Saving KinD node image: $NODE_IMAGE"
          docker save "$NODE_IMAGE" -o /tmp/kind-node-image.tar || true

      - name: Install Wails Linux dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.0-dev xvfb
          version: 1.0

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: e2e
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests (shard ${{ matrix.shard }}/2)
        if: matrix.registry != true && matrix.holmes_deploy != true && matrix.mcp != true
        working-directory: e2e
        run: xvfb-run -a npx playwright test tests/*.spec.ts tests/holmes tests/monitoring tests/swarm --shard=${{ matrix.shard }}/3
        env:
          CI: true
          PW_WORKERS: '1'
          KIND_CLUSTER_NAME: 'kdb-e2e'
          E2E_REPORT_PREFIX: '${{ matrix.name }}'
          E2E_WAILS_BASE_PORT: '${{ matrix.base_port }}'
          E2E_PREBUILT_BINARY: '${{ github.workspace }}/build/bin/kube-dev-bench-e2e'

      - name: Run MCP e2e tests
        if: matrix.mcp == true
        working-directory: e2e
        run: xvfb-run -a npx playwright test tests/mcp/
        env:
          CI: true
          PW_WORKERS: '1'
          KIND_CLUSTER_NAME: 'kdb-e2e'
          E2E_REPORT_PREFIX: '${{ matrix.name }}'
          E2E_WAILS_BASE_PORT: '${{ matrix.base_port }}'
          E2E_PREBUILT_BINARY: '${{ github.workspace }}/build/bin/kube-dev-bench-e2e'

      - name: Pre-load node image for Holmes mock (Holmes deploy shard only)
        if: matrix.holmes_deploy == true
        run: |
          set -euo pipefail
          IMAGE_PLATFORM="linux/amd64"
          KIND_NODE="kdb-e2e-control-plane"

          echo "Pulling ${HOLMES_MOCK_NODE_IMAGE} image for ${IMAGE_PLATFORM}..."
          docker exec --privileged "${KIND_NODE}" ctr --namespace=k8s.io images pull --platform "${IMAGE_PLATFORM}" "docker.io/library/${HOLMES_MOCK_NODE_IMAGE}"

          echo "Verifying ${HOLMES_MOCK_NODE_IMAGE} is present in kind node..."
          docker exec --privileged "${KIND_NODE}" ctr --namespace=k8s.io images ls | grep -E "(docker.io/library/)?${HOLMES_MOCK_NODE_IMAGE}"

      - name: Run Holmes deployment e2e tests
        if: matrix.holmes_deploy == true
        working-directory: e2e
        run: xvfb-run -a npx playwright test tests/holmes/60-holmes-onboarding-deploy.spec.ts
        env:
          CI: true
          PW_WORKERS: '1'
          KIND_CLUSTER_NAME: 'kdb-e2e'
          E2E_REPORT_PREFIX: '${{ matrix.name }}'
          E2E_WAILS_BASE_PORT: '${{ matrix.base_port }}'
          E2E_HOLMES_DEPLOY: '1'
          E2E_PREBUILT_BINARY: '${{ github.workspace }}/build/bin/kube-dev-bench-e2e'

      - name: Extract shard-1 failure summary
        if: always() && matrix.name == 'e2e-shard-1'
        working-directory: e2e
        run: |
          node scripts/extract-playwright-failures.mjs \
            "./test-results/ci-reports/${{ matrix.name }}.json" \
            "./test-results/ci-reports/${{ matrix.name }}-summary.md"

      - name: Run registry e2e tests
        if: matrix.registry == true
        working-directory: e2e
        run: xvfb-run -a npm run test:registry
        env:
          CI: true
          PW_WORKERS: '3'
          KIND_CLUSTER_NAME: 'kdb-e2e'
          E2E_WAILS_BASE_PORT: '${{ matrix.base_port }}'
          E2E_REGISTRY_SUITE: '1'
          E2E_SKIP_KIND: '1'
          E2E_PREBUILT_BINARY: '${{ github.workspace }}/build/bin/kube-dev-bench-e2e'

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-${{ matrix.name }}
          path: |
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: warn
          retention-days: 7

  release:
    runs-on: ${{ matrix.os }}
    needs: e2e
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact: KubeDevBench-windows-amd64.exe
          - os: windows-latest
            platform: windows
            arch: arm64
            artifact: KubeDevBench-windows-arm64.exe
          # macOS builds
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact: KubeDevBench-darwin-amd64.zip
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact: KubeDevBench-darwin-arm64.zip
          # Linux builds
          - os: ubuntu-22.04
            platform: linux
            arch: amd64
            artifact: KubeDevBench-linux-amd64
          # Linux ARM64 disabled - cross-compilation fails consistently
          # - os: ubuntu-22.04
          #   platform: linux
          #   arch: arm64
          #   artifact: KubeDevBench-linux-arm64

    env:
      CODE_SIGN_PFX: ${{ secrets.CODE_SIGN_PFX }}
      CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails Linux dependencies (cached)
        if: matrix.platform == 'linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.0-dev
          version: 1.0

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails app
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.arch == 'arm64' && matrix.platform == 'linux' && '1' || '' }}
          CC: ${{ matrix.arch == 'arm64' && matrix.platform == 'linux' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            wails build -platform ${{ matrix.platform }}/${{ matrix.arch }}
          else
            wails build -platform ${{ matrix.platform }}/${{ matrix.arch }} -o ${{ matrix.artifact }}
          fi
        shell: bash

      - name: List build output
        run: ls -laR build/bin/
        shell: bash

      - name: Sign Windows executable
        if: matrix.platform == 'windows' && env.CODE_SIGN_PFX != '' && env.CODE_SIGN_PASSWORD != ''
        shell: pwsh
        run: |
          # Decode the base64-encoded PFX certificate stored as a GitHub secret
          $pfxPath = Join-Path $env:TEMP "codesign.pfx"
          try {
            [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:CODE_SIGN_PFX))

            # Locate signtool.exe from the Windows SDK (pre-installed on windows-latest)
            $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
              -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "x64" } |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName

            if (-not $signtool) {
              throw "signtool.exe not found. Ensure the Windows SDK is installed."
            }

            Write-Host "Using signtool: $signtool"

            # Sign with SHA-256, dual-timestamp via DigiCert RFC 3161 server
            & $signtool sign `
              /fd SHA256 `
              /f $pfxPath `
              /p $env:CODE_SIGN_PASSWORD `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              "build/bin/${{ matrix.artifact }}"

            if ($LASTEXITCODE -ne 0) {
              throw "signtool signing failed with exit code $LASTEXITCODE"
            }

            # Verify the signature
            & $signtool verify /pa /v "build/bin/${{ matrix.artifact }}"

            if ($LASTEXITCODE -ne 0) {
              throw "signtool verification failed with exit code $LASTEXITCODE"
            }

            Write-Host "Signing complete."
          }
          finally {
            # Never leave the PFX on disk.
            Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Ad-hoc sign macOS app bundle
        if: matrix.platform == 'darwin'
        run: |
          # Wails produces a .app bundle on macOS. Ad-hoc signing marks the binary
          # as intentionally signed (using the '-' identity which requires no
          # certificate). This does NOT satisfy Gatekeeper for internet downloads,
          # but prevents "missing signature" errors and improves compatibility.
          # Users still need to remove the quarantine attribute after download —
          # see README for instructions.
          APP_BUNDLE=$(ls -d build/bin/*.app 2>/dev/null | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found in build/bin/"
            ls -la build/bin/
            exit 1
          fi
          echo "Found app bundle: $APP_BUNDLE"
          codesign --sign - --deep --force --no-strict "$APP_BUNDLE"
          echo "Ad-hoc signing complete"
          codesign --display --verbose=2 "$APP_BUNDLE" 2>&1 || true

      - name: Package macOS app bundle
        if: matrix.platform == 'darwin'
        working-directory: build/bin
        run: |
          # Wails produces a .app bundle on macOS
          APP_BUNDLE=$(ls -d *.app 2>/dev/null | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found in build/bin/"
            ls -la
            exit 1
          fi
          echo "Found app bundle: $APP_BUNDLE"

          # Bundle a helper script so users can easily remove the quarantine
          # attribute that macOS sets on internet-downloaded files. Without this,
          # Gatekeeper blocks the app with "damaged and can't be opened".
          # Note: heredocs cannot be used here because their body lines would have
          # zero indentation, causing YAML to terminate the block scalar early.
          printf '%s\n' \
            '#!/bin/bash' \
            '# KubeDevBench macOS installer - removes Gatekeeper quarantine attribute.' \
            '# Run once after extracting the zip to fix "damaged and cant be opened".' \
            'set -e' \
            'APP=$(ls -d *.app 2>/dev/null | head -1)' \
            '[ -z "$APP" ] && echo "ERROR: No .app bundle found here." && exit 1' \
            'echo "Removing quarantine attribute from $APP ..."' \
            'xattr -dr com.apple.quarantine "$APP"' \
            'echo ""' \
            'echo "Done! You can now open $APP normally."' \
            'echo "To install, drag $APP to /Applications."' \
            > install.sh
          chmod +x install.sh

          zip -r -y "${{ matrix.artifact }}" "$APP_BUNDLE" install.sh
          rm install.sh
          echo "Created ${{ matrix.artifact }} ($(du -h ${{ matrix.artifact }} | cut -f1))"

      - name: Upload release artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.ref == 'refs/heads/dev' && format('snapshot-{0}', matrix.artifact) || matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}
          retention-days: ${{ github.ref == 'refs/heads/dev' && 7 || 30 }}

      - name: Upload release artifact (macOS/Linux)
        if: matrix.platform != 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.ref == 'refs/heads/dev' && format('snapshot-{0}', matrix.artifact) || matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}
          retention-days: ${{ github.ref == 'refs/heads/dev' && 7 || 30 }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-dev-snapshot:
    runs-on: ubuntu-22.04
    needs: release
    if: github.ref == 'refs/heads/dev'
    permissions:
      contents: write
    steps:
      - name: Download snapshot artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: snapshot-*
          path: snapshots
          merge-multiple: true

      - name: List snapshot files
        run: ls -la snapshots

      - name: Publish rolling dev snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-snapshot
          name: Development Snapshot
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: snapshots/*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}