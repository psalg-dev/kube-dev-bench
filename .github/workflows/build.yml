name: Build

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests (with coverage)
        working-directory: frontend
        run: npm test -- --coverage

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn
          retention-days: 7

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  backend:
    runs-on: ubuntu-22.04
    needs: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Go dependencies
        run: go mod download

      - name: Run Go tests (with coverage)
        run: go test -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage summary
        run: go tool cover -func coverage.out | tail -1

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.out
          if-no-files-found: warn
          retention-days: 7

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Go app
        run: go build -v .

  e2e:
    runs-on: ubuntu-22.04
    needs: backend
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install Go dependencies
        run: go mod download

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Install KinD
        run: |
          curl -sSL -o kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Initialize Docker Swarm (for Swarm E2Es)
        run: |
          state=$(docker info --format '{{.Swarm.LocalNodeState}}' 2>/dev/null || echo "inactive")
          echo "Swarm state before: ${state}"
          if [ "${state}" != "active" ]; then
            docker swarm init --advertise-addr 127.0.0.1
          fi
          docker info --format '{{.Swarm.LocalNodeState}}'

      - name: Cache KinD node image
        uses: actions/cache@v4
        id: kind-image-cache
        with:
          path: /tmp/kind-node-image.tar
          key: kind-v0.23.0-node-image

      - name: Load cached KinD node image
        if: steps.kind-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/kind-node-image.tar

      - name: Create KinD cluster
        run: |
          kind create cluster --name kdb-e2e --wait 120s

      - name: Save KinD node image for cache
        if: steps.kind-image-cache.outputs.cache-hit != 'true'
        run: |
          NODE_IMAGE=$(docker ps --filter "name=kdb-e2e-control-plane" --format "{{.Image}}")
          echo "Saving KinD node image: $NODE_IMAGE"
          docker save "$NODE_IMAGE" -o /tmp/kind-node-image.tar || true

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: |
            /var/cache/apt/archives
          key: apt-${{ runner.os }}-wails-deps-v1

      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev xvfb

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: e2e
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests (shard ${{ matrix.shard }}/3)
        working-directory: e2e
        run: xvfb-run -a npx playwright test --shard=${{ matrix.shard }}/3
        env:
          CI: true
          PW_WORKERS: '3'
          KIND_CLUSTER_NAME: 'kdb-e2e'

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-shard-${{ matrix.shard }}
          path: |
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: warn
          retention-days: 7

  release:
    runs-on: ${{ matrix.os }}
    needs: e2e
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact: KubeDevBench-windows-amd64.exe
          - os: windows-latest
            platform: windows
            arch: arm64
            artifact: KubeDevBench-windows-arm64.exe
          # macOS builds
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact: KubeDevBench-darwin-amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact: KubeDevBench-darwin-arm64
          # Linux builds
          - os: ubuntu-22.04
            platform: linux
            arch: amd64
            artifact: KubeDevBench-linux-amd64
          # Linux ARM64 disabled - cross-compilation fails consistently
          # - os: ubuntu-22.04
          #   platform: linux
          #   arch: arm64
          #   artifact: KubeDevBench-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Wails app
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.arch == 'arm64' && matrix.platform == 'linux' && '1' || '' }}
          CC: ${{ matrix.arch == 'arm64' && matrix.platform == 'linux' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          wails build -platform ${{ matrix.platform }}/${{ matrix.arch }} -o ${{ matrix.artifact }}

      - name: Upload release artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}
          retention-days: 30

      - name: Upload release artifact (macOS/Linux)
        if: matrix.platform != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}