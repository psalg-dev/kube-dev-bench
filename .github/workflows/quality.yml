name: Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run quality pipeline
        working-directory: quality
        run: |
          chmod +x scripts/*.sh
          ./scripts/run-all.sh

      - name: Check Go complexity
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          go install github.com/uudashr/gocognit/cmd/gocognit@latest
          gocyclo -over 15 ./... | tee complexity-report.txt
          if [ -s complexity-report.txt ]; then
            echo "::warning::Functions with high cyclomatic complexity found"
          fi
          gocognit -over 20 ./... | tee cognitive-report.txt
          if [ -s cognitive-report.txt ]; then
            echo "::warning::Functions with high cognitive complexity found"
          fi

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: quality/reports/
          retention-days: 30

      - name: Comment on PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('quality/reports/combined/quality-report.json'));

            const body = `## Quality Report

            | Metric | Value | Status |
            |--------|-------|--------|
            | Go Coverage | ${report.summary.goCoverage ?? 'N/A'}% | ${(report.summary.goCoverage ?? 0) >= 70 ? '✅' : '❌'} |
            | JS Coverage | ${report.summary.jsCoverage ?? 'N/A'}% | ${(report.summary.jsCoverage ?? 0) >= 70 ? '✅' : '❌'} |
            | ESLint Errors | ${report.summary.jsLintErrors ?? 0} | ${(report.summary.jsLintErrors ?? 0) === 0 ? '✅' : '❌'} |
            | Secrets | ${report.summary.secretsFound ?? 0} | ${(report.summary.secretsFound ?? 0) === 0 ? '✅' : '❌'} |
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
