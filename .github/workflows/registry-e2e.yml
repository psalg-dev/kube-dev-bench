name: Registry E2E

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  e2e-registry:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (for Wails assetdir)
        working-directory: frontend
        run: npm run build

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Install KinD
        run: |
          curl -sSL -o kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Initialize Docker Swarm (for Swarm E2Es)
        run: |
          state=$(docker info --format '{{.Swarm.LocalNodeState}}' 2>/dev/null || echo "inactive")
          echo "Swarm state before: ${state}"
          if [ "${state}" != "active" ]; then
            docker swarm init --advertise-addr 127.0.0.1
          fi
          docker info --format '{{.Swarm.LocalNodeState}}'

      - name: Create KinD cluster
        run: |
          kind create cluster --name kdb-e2e --wait 120s

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: |
            /var/cache/apt/archives
          key: apt-${{ runner.os }}-wails-deps-v1

      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev xvfb

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run registry e2e tests
        working-directory: e2e
        run: xvfb-run -a npm run test:registry
        env:
          CI: true
          PW_WORKERS: '3'
          KIND_CLUSTER_NAME: 'kdb-e2e'

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-registry-test-results
          path: |
            e2e/test-results
            e2e/playwright-report
          if-no-files-found: warn
          retention-days: 7