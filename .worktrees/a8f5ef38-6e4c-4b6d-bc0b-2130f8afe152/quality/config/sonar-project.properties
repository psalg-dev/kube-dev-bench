# SonarQube Project Configuration
sonar.projectKey=kube-dev-bench
sonar.projectName=KubeDevBench
sonar.projectVersion=1.0

# Source paths
sonar.sources=pkg,frontend/src
sonar.tests=pkg,frontend/src
sonar.test.inclusions=**/*_test.go,**/*.test.js,**/*.test.jsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/vendor/**,**/wailsjs/**,**/dist/**,**/build/**

# Language-specific settings
sonar.go.coverage.reportPaths=quality/reports/go/coverage.out
sonar.javascript.lcov.reportPaths=quality/reports/js/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Server URL (adjust for your SonarQube instance)
sonar.host.url=http://sonarqube:9000
