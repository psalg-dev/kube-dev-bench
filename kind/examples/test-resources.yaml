# Example Kubernetes resources for the kube-dev-bench application
# This file is applied automatically by kind/manager.sh after the KinD cluster is ready.
# It creates one example of each resource type the app handles plus a dedicated "test" namespace.
# All names are prefixed with "example-" to avoid collisions.
---
apiVersion: v1
kind: Namespace
metadata:
  name: test
  labels:
    purpose: example
  annotations:
    kube-dev-bench/example: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: example-config
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
data:
  APP_MODE: "demo"
  WELCOME_MESSAGE: "Hello from ConfigMap"
---
apiVersion: v1
kind: Secret
metadata:
  name: example-secret
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
stringData:
  username: demo
  password: demo123
---
# Cluster-scoped PersistentVolume (static provisioning example)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: example-pv
  labels:
    type: local
  annotations:
    kube-dev-bench/example: "true"
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: manual
  hostPath:
    path: /tmp/example-pv
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - dev-control-plane
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: example-pvc
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
  storageClassName: manual
  selector:
    matchLabels:
      type: local
---
apiVersion: v1
kind: Pod
metadata:
  name: example-pod
  namespace: test
  labels:
    app: example-pod
  annotations:
    kube-dev-bench/example: "true"
spec:
  containers:
    - name: main
      image: busybox:1.36
      command: ["/bin/sh","-c","echo Pod started; sleep 3600"]
      env:
        - name: WELCOME_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: example-config
              key: WELCOME_MESSAGE
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-deployment
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: example-deployment
  template:
    metadata:
      labels:
        app: example-deployment
      annotations:
        kube-dev-bench/example: "true"
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: example-replicaset
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-replicaset
  template:
    metadata:
      labels:
        app: example-replicaset
      annotations:
        kube-dev-bench/example: "true"
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: example-daemonset
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
spec:
  selector:
    matchLabels:
      app: example-daemonset
  template:
    metadata:
      labels:
        app: example-daemonset
      annotations:
        kube-dev-bench/example: "true"
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: logger
          image: busybox:1.36
          command: ["/bin/sh","-c","while true; do date; sleep 60; done"]
---
# Headless service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: example-statefulset
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
spec:
  clusterIP: None
  selector:
    app: example-statefulset
  ports:
    - port: 80
      name: web
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: example-statefulset
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
spec:
  serviceName: example-statefulset
  replicas: 1
  selector:
    matchLabels:
      app: example-statefulset
  template:
    metadata:
      labels:
        app: example-statefulset
      annotations:
        kube-dev-bench/example: "true"
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
      terminationGracePeriodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: example-job
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
spec:
  template:
    metadata:
      labels:
        job: example-job
      annotations:
        kube-dev-bench/example: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: job
          image: busybox:1.36
          command: ["/bin/sh","-c","echo Hello from Job; date"]
  backoffLimit: 1
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: example-cronjob
  namespace: test
  annotations:
    kube-dev-bench/example: "true"
spec:
  schedule: "*/30 * * * *" # every 30 minutes
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            kube-dev-bench/example: "true"
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cron
              image: busybox:1.36
              command: ["/bin/sh","-c","echo Cron run at $(date)"]
