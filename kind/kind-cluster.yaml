# KinD cluster configuration
# Docs: https://kind.sigs.k8s.io/docs/user/configuration/
# This defines a lightweight 2 node cluster (1 control-plane + 1 worker)
# with a couple of example NodePort-friendly port mappings you can adapt.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev
nodes:
  - role: control-plane
    # Example port mappings (uncomment/adapt if you need host access to NodePorts or Ingress)
    extraPortMappings:
      - containerPort: 30080   # e.g. HTTP ingress / NodePort
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443   # e.g. HTTPS ingress / NodePort
        hostPort: 30443
        protocol: TCP
  - role: worker
networking:
  # Set if you need a specific pod or service subnet. Defaults are usually fine.
  # podSubnet: 10.244.0.0/16
  # serviceSubnet: 10.96.0.0/12
  # disableDefaultCNI: false
  # kubeProxyMode: ""
featureGates: {}
runtimeConfig: {}

