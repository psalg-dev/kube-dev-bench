# Docker Compose file to provision a local KinD (Kubernetes in Docker) cluster
# Nodes are created as sibling Docker containers (no docker-in-docker).
# Usage (PowerShell / cmd):
#   cd kind
#   docker compose up -d
# Then: docker compose exec kind kubectl get nodes
services:
  kind:
    image: alpine:3.19
    container_name: kind-manager
    working_dir: /kind
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./kind-cluster.yaml:/kind/kind-cluster.yaml:ro
      - ./output:/kind/output
      - ./manager.sh:/kind/manager.sh:ro
      - ./examples:/kind/examples:ro
    environment:
      KIND_VERSION: ${KIND_VERSION:-v0.23.0}
      KUBECTL_VERSION: ${KUBECTL_VERSION:-stable}
      KUBECONFIG: /kind/output/kubeconfig
      DOCKER_HOST: unix:///var/run/docker.sock
      DEBUG_KEEP_ON_ERROR: ${DEBUG_KEEP_ON_ERROR:-0}
    # Directly invoke the script via /bin/sh to avoid needing chmod on a read-only mount
    entrypoint: ["/bin/sh"]
    command: ["/kind/manager.sh"]
    restart: unless-stopped
    # Note: Host networking is NOT needed - KinD automatically maps API server port to host
    # The TLS validation issue is handled by the application's TLS fallback logic

volumes: {}
